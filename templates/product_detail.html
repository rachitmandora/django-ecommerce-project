<!DOCTYPE html>
<html>
<head>
<title>{{ product.name }}</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.product{
background:white;
padding:20px;
max-width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:300px;
}

.price{
color:green;
font-size:20px;
font-weight:bold;
}

button{
background:#ff9900;
border:none;
padding:12px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="product">

<h1>{{ product.name }}</h1>

<img src="{{ product.image.url }}">

<p class="price">₹{{ product.price }}</p>

<p>{{ product.description }}</p>

<button>Add to Cart</button>

</div>

</body>
</html>

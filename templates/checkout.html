<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .box{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Checkout</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Address" required>
        <input type="text" placeholder="Phone Number" required>

        <button type="submit">Pay Now</button>
    </form>
</div>

</body>
</html>

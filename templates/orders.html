<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            margin:0;
        }

        .header{
            background:#222;
            color:white;
            padding:20px;
            text-align:center;
        }

        .header a{
            color:#00bcd4;
            text-decoration:none;
        }

        .container{
            padding:20px;
        }

        .order{
            background:white;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .details{
            width:70%;
        }

        .status{
            padding:8px 12px;
            border-radius:5px;
            font-weight:bold;
        }

        .Pending{
            background:orange;
            color:white;
        }

        .Shipped{
            background:blue;
            color:white;
        }

        .Delivered{
            background:green;
            color:white;
        }

        .empty{
            text-align:center;
            margin-top:50px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>My Orders</h1>
    <a href="/">← Back to Home</a>
</div>

<div class="container">

{% if orders %}

    {% for order in orders %}

    <div class="order">

        <div class="details">
            <h3>{{ order.product.name }}</h3>
            <p>Price: ₹{{ order.price }}</p>
            <p>Quantity: {{ order.quantity }}</p>
        </div>

        <!-- Status -->
        <div class="status {{ order.status }}">
            {{ order.status }}
        </div>

    </div>

    {% endfor %}

{% else %}

    <div class="empty">
        <h2>No Orders Yet 😢</h2>
    </div>

{% endif %}

</div>

</body>
</html>
